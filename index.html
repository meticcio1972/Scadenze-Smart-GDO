<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Scadenze Smart GDO</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<h1>Scadenze Smart GDO</h1>

<div class="dashboard">

<div class="card scaduti">
⚫ Scaduti
</div>

<div class="card g3">
🔴 Entro 3 giorni
</div>

<div class="card g7">
🟠 Entro 7 giorni
</div>

<div class="card g10">
🟡 Entro 10 giorni
</div>

<div class="card g15">
🟢 Entro 15 giorni
</div>

<div class="card offerta">
🔵 Offerta
</div>

<div class="card totale">
📦 Totale Referenze
</div>

</div>
<label for="reparto"><strong>Reparto</strong></label>

<select id="reparto">
    <option value="macelleria">🥩 Macelleria</option>
    <option value="gastronomia">🧀 Gastronomia</option>
    <option value="pescheria">🐟 Pescheria</option>
    <option value="ortofrutta">🥬 Ortofrutta</option>
    <option value="latticini">🥛 Latticini</option>
    <option value="panetteria">🍞 Panetteria</option>
    <option value="pasticceria">🍰 Pasticceria</option>
    <option value="drogheria">🍪 Drogheria</option>
    <option value="surgelati">🧊 Surgelati</option>
</select>

<br><br>
<input type="file" id="csvFile">

<input
type="text"
placeholder="Cerca prodotto">

<button>
➕ Nuova Referenza
</button>

<button onclick="esportaVisualizzati()">
📊 Esporta Categoria
</button>

<div id="contenuto">

Nessun dato caricato

</div>


<script src="storage.js"></script>
<script src="dashboard.js"></script>
<script src="csv.js"></script>
<script src="prodotti.js"></script>
<script src="offerte.js"></script>
<script src="storico.js"></script>
<script src="ricerca.js"></script>
<script src="export.js"></script>
<script src="app.js"></script>

</body> 

</html>
