<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scadenze Smart GDO</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.card-container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.card{
padding:20px;
border-radius:12px;
text-align:center;
font-weight:bold;
font-size:22px;
color:white;
}

.red{background:#d9534f;}
.orange{background:#f0ad4e;}
.yellow{background:#f7dc6f;color:black;}
.green{background:#5cb85c;}
.blue{background:#4285f4;}

input,button{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:14px;
}

th{
background:#4285f4;
color:white;
}

</style>
</head>

<body>

<h1>Scadenze Smart GDO</h1>

<input type="file" id="csvFile">

<div class="card-container">

<div class="card red">
🔴<br>
3 Giorni<br>
<span id="cnt3">0</span>
</div>

<div class="card orange">
🟠<br>
7 Giorni<br>
<span id="cnt7">0</span>
</div>

<div class="card yellow">
🟡<br>
10 Giorni<br>
<span id="cnt10">0</span>
</div>

<div class="card green">
🟢<br>
15 Giorni<br>
<span id="cnt15">0</span>
</div>

<div class="card blue">
📦<br>
Referenze<br>
<span id="totale">0</span>
</div>

</div>

<br>

<input type="text"
id="ricerca"
placeholder="Cerca prodotto..."
onkeyup="filtraTabella()">

<button onclick="aggiungiReferenza()">
➕ Nuova Referenza
</button>

<table id="tabella">

<thead>

<tr>

<th>Codice</th>
<th>Descrizione</th>
<th>Scadenza</th>
<th>Pezzi</th>
<th>Offerta</th>
<th>Storico</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

<script>

let prodotti=[];
document.getElementById("csvFile").addEventListener("change",function(e){

const file=e.target.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(event){

const testo=event.target.result;

const righe=testo.split("\n");

prodotti=[];

let cnt3=0;
let cnt7=0;
let cnt10=0;
let cnt15=0;

for(let i=1;i<righe.length;i++){

const colonne=righe[i].trim().split(";");

if(colonne.length<3) continue;

const codice=colonne[0].trim();
const descrizione=colonne[1].trim();
const dataStr=colonne[2].trim();

let pezzi=0;
let offerta="NO";

if(colonne.length>3){
pezzi=colonne[3];
}

if(colonne.length>4){
offerta=colonne[4];
}

const parti=dataStr.split("/");

if(parti.length!==3) continue;

const dataScad=new Date(
parti[2],
parti[1]-1,
parti[0]
);

const oggi=new Date();

oggi.setHours(0,0,0,0);

const diff=Math.ceil(
(dataScad-oggi)/(1000*60*60*24)
);

if(diff<=3) cnt3++;
if(diff<=7) cnt7++;
if(diff<=10) cnt10++;
if(diff<=15) cnt15++;

prodotti.push({
codice,
descrizione,
data:dataStr,
pezzi,
offerta,
storico:""
});

}

document.getElementById("cnt3").innerText=cnt3;
document.getElementById("cnt7").innerText=cnt7;
document.getElementById("cnt10").innerText=cnt10;
document.getElementById("cnt15").innerText=cnt15;

document.getElementById("totale").innerText=prodotti.length;

aggiornaTabella();

};

reader.readAsText(file);

});

function aggiornaTabella(){

const tbody=document.getElementById("tbody");

tbody.innerHTML="";

prodotti.forEach((p,index)=>{

tbody.innerHTML+=`

<tr>

<td>${p.codice}</td>

<td>${p.descrizione}</td>

<td>
<input
type="date"
onchange="modificaData(${index},this.value)"
>
</td>

<td>
<input
type="number"
value="${p.pezzi}"
>
</td>

<td>

<select>

<option ${p.offerta=="NO"?"selected":""}>
NO
</option>

<option ${p.offerta=="SI"?"selected":""}>
SI
</option>

</select>

</td>

<td>${p.storico}</td>

</tr>

`;

});

}

function modificaData(index,nuovaData){

const vecchia=prodotti[index].data;

prodotti[index].storico=vecchia;

prodotti[index].data=nuovaData;

aggiornaTabella();

}

function aggiungiReferenza(){

prodotti.push({

codice:"",
descrizione:"Nuova Referenza",
data:"",
pezzi:0,
offerta:"NO",
storico:""

});

aggiornaTabella();

}

function filtraTabella(){

const filtro=document
.getElementById("ricerca")
.value
.toLowerCase();

const righe=document
.querySelectorAll("#tbody tr");

righe.forEach(riga=>{

const testo=riga.innerText.toLowerCase();

riga.style.display=
testo.includes(filtro)
? ""
: "none";

});

}

</script>

</body>
</html>
